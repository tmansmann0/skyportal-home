<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SkyPortal Home — Sign in</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body class="login"><main class="login-card"><div class="portal-mark">◉</div><h1>SkyPortal Home</h1>
<p>Enter the setup token printed by the installer.</p>
{% if error %}<div class="notice error">{{ error }}</div>{% endif %}
<form method="post"><label>Setup token<input name="token" type="password" autocomplete="current-password" autofocus required></label>
<button type="submit">Open controller</button></form></main></body></html>
